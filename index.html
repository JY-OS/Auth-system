<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>代理商授权审批系统</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23C8A44E'/><text x='16' y='23' text-anchor='middle' fill='%230A0A0A' font-size='20' font-weight='800'>A</text></svg>">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0A0A;font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
input,textarea,button{font-family:inherit}
#root{min-height:100vh}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useMemo } = React;

const G = {
  bg:"#0A0A0A",bg2:"#111111",bg3:"#1A1A1A",bg4:"#222222",
  gold:"#C8A44E",goldL:"#E8D48B",goldD:"#9A7B2F",goldBg:"rgba(200,164,78,0.08)",
  goldBg2:"rgba(200,164,78,0.15)",goldBg3:"rgba(200,164,78,0.25)",
  text:"#F0EDE4",text2:"#A8A293",text3:"#6B6560",
  border:"rgba(200,164,78,0.12)",border2:"rgba(200,164,78,0.25)",
  red:"#E85454",redBg:"rgba(232,84,84,0.12)",
  green:"#4ADE80",greenBg:"rgba(74,222,128,0.12)",
};

const regionColors = {
  "全国":{bg:"rgba(200,164,78,0.15)",c:"#C8A44E"},
  "东区":{bg:"rgba(96,165,250,0.15)",c:"#60A5FA"},
  "北一区":{bg:"rgba(167,139,250,0.15)",c:"#A78BFA"},
  "北二区":{bg:"rgba(192,132,252,0.15)",c:"#C084FC"},
  "华南区":{bg:"rgba(74,222,128,0.15)",c:"#4ADE80"},
  "西南区":{bg:"rgba(251,146,60,0.15)",c:"#FB923C"},
};
const REGIONS=["全国","东区","北一区","北二区","华南区","西南区"];
const tierDefs=[
  {name:"战略级",min:3000,color:"#FFD700",rule:"3000万以上"},
  {name:"金牌",min:2000,color:"#C8A44E",rule:"2000-3000万"},
  {name:"银牌",min:1000,color:"#C0C0C0",rule:"1000-2000万"},
  {name:"铜牌",min:500,color:"#CD7F32",rule:"500-1000万"},
  {name:"新锐之星",min:100,color:"#60A5FA",rule:"100-500万"},
];
const approvalChains={
  "西南区":{type:"long",sales:"一线销售/主管",area:"刘经理（区域经理）",regional:"黄占良（大区经理）",senior:"孔颖佳（高级大区经理）",national:"周小杰（全国经理）",director:"吴璟谊（销售总监）"},
  "东区":{type:"short",sales:"一线经理",national:"周小杰（全国经理）",director:"吴璟谊（销售总监）"},
  "北一区":{type:"short",sales:"一线经理",national:"周小杰（全国经理）",director:"吴璟谊（销售总监）"},
  "北二区":{type:"short",sales:"一线经理",national:"周小杰（全国经理）",director:"吴璟谊（销售总监）"},
  "华南区":{type:"long",sales:"一线销售/主管",area:"陈经理（区域经理）",regional:"黄涛（大区经理）",senior:"何军（高级大区经理）",national:"周小杰（全国经理）",director:"吴璟谊（销售总监）"},
};
const typeDefs=["一级代理商","二级代理商","配送端口"];
const yearDefs=[
  {label:"10年以上",check:y=>y>=10},
  {label:"5年以上",check:y=>y>=5&&y<10},
  {label:"2年以上",check:y=>y>=2&&y<5},
  {label:"新经销商",check:y=>y<2},
];
const allDealers=[
  {n:"成都诚佳欣浩",c:"吴超",r:"西南区",y:5,rev:2200,type:"一级代理商",h:8},
  {n:"重庆康瑞达",c:"刘洋",r:"西南区",y:3,rev:800,type:"一级代理商",h:5},
  {n:"昆明德润",c:"陈飞",r:"西南区",y:1,rev:350,type:"二级代理商",h:3},
  {n:"贵阳恒信",c:"周勇",r:"西南区",y:8,rev:1600,type:"一级代理商",h:7},
  {n:"上海吴铠科贸",c:"吴铠",r:"东区",y:6,rev:3200,type:"一级代理商",h:12},
  {n:"南京博远",c:"张磊",r:"东区",y:2,rev:1100,type:"二级代理商",h:6},
  {n:"杭州鑫诺",c:"周华",r:"东区",y:12,rev:4500,type:"一级代理商",h:18},
  {n:"北京中盛",c:"王刚",r:"北一区",y:7,rev:2800,type:"一级代理商",h:15},
  {n:"天津仁合",c:"李强",r:"北一区",y:11,rev:3500,type:"一级代理商",h:14},
  {n:"石家庄百瑞",c:"孙明",r:"北二区",y:4,rev:1500,type:"二级代理商",h:7},
  {n:"沈阳恒达",c:"马超",r:"北二区",y:8,rev:2100,type:"一级代理商",h:10},
  {n:"广州信达",c:"林峰",r:"华南区",y:4,rev:1800,type:"一级代理商",h:9},
  {n:"深圳瑞康",c:"黄涛",r:"华南区",y:2,rev:600,type:"配送端口",h:4},
  {n:"武汉合众",c:"赵明",r:"华南区",y:1,rev:250,type:"配送端口",h:2},
];

function getTier(rev){for(const t of tierDefs)if(rev>=t.min)return t;return{name:"待评定",color:G.text3};}
function Badge({children,color,bg}){return <span style={{fontSize:11,padding:"3px 10px",borderRadius:6,background:bg||"rgba(200,164,78,0.12)",color:color||G.gold,fontWeight:600,whiteSpace:"nowrap",display:"inline-block"}}>{children}</span>;}
function RegionBadge({region}){const c=regionColors[region]||regionColors["全国"];return <Badge color={c.c} bg={c.bg}>{region}</Badge>;}
function TierBadge({rev}){const t=getTier(rev);return <Badge color={t.color} bg={t.color+"22"}>{t.name}</Badge>;}
function Card({children,style,onClick,danger}){return <div onClick={onClick} style={{background:G.bg2,border:"1px solid "+(danger?"rgba(232,84,84,0.25)":G.border),borderRadius:12,padding:16,marginBottom:10,cursor:onClick?"pointer":"default",...style}}>{children}</div>;}
function Metric({label,value,color}){return <div style={{background:G.bg3,borderRadius:8,padding:"10px 12px",border:"1px solid "+G.border}}><div style={{fontSize:11,color:G.text3}}>{label}</div><div style={{fontSize:20,fontWeight:700,marginTop:4,color:color||G.goldL}}>{value}</div></div>;}
function Divider(){return <div style={{height:1,background:G.border,margin:"14px 0"}}/>;}
function TabBar({items,active,onSelect}){return <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:12}}>{items.map((t,i)=><div key={i} onClick={()=>onSelect(i)} style={{padding:"6px 14px",fontSize:12,borderRadius:8,cursor:"pointer",background:active===i?G.goldBg2:"transparent",color:active===i?G.goldL:G.text3,border:"1px solid "+(active===i?G.border2:G.border),fontWeight:active===i?600:400}}>{t}</div>)}</div>;}

function FlowPage(){
  const[region,setRegion]=useState(4);
  const curR=REGIONS.slice(1)[region];
  const chain=approvalChains[curR]||approvalChains["西南区"];
  const isLong=chain.type==="long";

  const steps=[
    {title:"授权申请发起",sub:"代理商申请 / 一线销售提出申请 / 销售主管复核发起",color:G.gold,bgColor:G.goldBg2,borderColor:G.border2,icon:"📋"},
    {title:"销售运营核验",sub:"系统自动匹配历史植入数据，标注差异",color:"#60A5FA",bgColor:"rgba(96,165,250,0.12)",borderColor:"rgba(96,165,250,0.25)",icon:"🔍",auto:true},
    {title:chain.sales,sub:"确认经销商实际情况，填写意见",color:"#FB923C",bgColor:"rgba(251,146,60,0.1)",borderColor:"rgba(251,146,60,0.25)",icon:"👤",eye:isLong?"区域经理及以上同步可见":"全国经理及销售总监同步可见",note:"视区域和销售成熟度而定，可由上级配置跳过"},
  ];
  if(isLong){
    steps.push({title:chain.area,sub:"审核一线销售意见，确认区域情况",color:"#FB923C",bgColor:"rgba(251,146,60,0.06)",borderColor:"rgba(251,146,60,0.2)",icon:"📋",eye:"大区经理及以上同步可见"});
    steps.push({title:chain.regional,sub:"审核数据合理性，逐产品审批",color:"#A78BFA",bgColor:"rgba(167,139,250,0.1)",borderColor:"rgba(167,139,250,0.25)",icon:"👔",eye:"高级大区经理及以上同步可见"});
    steps.push({title:chain.senior,sub:"复核大区整体授权合理性",color:"#C084FC",bgColor:"rgba(192,132,252,0.1)",borderColor:"rgba(192,132,252,0.25)",icon:"🎖️",eye:"全国经理及销售总监同步可见"});
  }
  steps.push({title:chain.national,sub:isLong?"全国层面把关":"审核数据合理性，逐产品审批",color:"#4ADE80",bgColor:"rgba(74,222,128,0.1)",borderColor:"rgba(74,222,128,0.25)",icon:"🌐",eye:"销售总监同步可见"});
  steps.push({title:chain.director,sub:"最终审批确认",color:"#FFD700",bgColor:"rgba(255,215,0,0.08)",borderColor:"rgba(255,215,0,0.2)",icon:"👑"});
  steps.push({title:"授权生效 → 通知商务部",sub:"系统自动生成授权书，自动通知商务部发放授权文件给经销商",color:G.green,bgColor:G.greenBg,borderColor:"rgba(74,222,128,0.25)",icon:"✅",auto:true});

  const allViewers=isLong?[chain.area,chain.regional,chain.senior,chain.national,chain.director].map(s=>s.split("（")[0]).join("、"):[chain.national,chain.director].map(s=>s.split("（")[0]).join("、");

  return <div>
    <div style={{background:G.goldBg,border:"1px solid "+G.border,borderRadius:10,padding:"12px 16px",marginBottom:14}}>
      <div style={{fontSize:13,fontWeight:700,color:G.goldL,marginBottom:4}}>核心规则：全链路透明 + 分产品授权</div>
      <div style={{fontSize:12,color:G.gold,lineHeight:1.7}}>
        • 首次系统化管理，未来需按产品线管理，故要求<b>逐医院、逐产品</b>独立审批<br/>
        • 申请一旦发起，所有上级实时可见，任何层级无法私自拦截<br/>
        • 各区域组织架构不同，审批层级因区域而异（点击上方大区标签查看）<br/>
        • 一线驳回时系统自动通知上级，上级如认为不合理可发起重新审批
      </div>
    </div>
    <div style={{fontSize:12,color:G.text3,marginBottom:8}}>选择大区查看对应审批链（各区域组织架构不同）：</div>
    <TabBar items={REGIONS.slice(1)} active={region} onSelect={setRegion}/>
    <div style={{background:G.bg3,border:"1px solid "+G.border,borderRadius:8,padding:"8px 14px",fontSize:12,color:G.text2,marginBottom:12}}>
      {isLong
        ?<span>🏢 <b style={{color:G.goldL}}>{curR}</b>：一线销售 → 区域经理 → 大区经理 → 高级大区经理 → 全国经理 → 销售总监（共6级审批）</span>
        :<span>🏢 <b style={{color:G.goldL}}>{curR}</b>：一线经理 → 全国经理 → 销售总监（共3级审批）</span>
      }
    </div>
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:0,padding:"10px 0"}}>
      {steps.map((s,i)=><div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",width:"100%"}}>
        <div style={{background:s.bgColor,border:"1px solid "+s.borderColor,borderRadius:12,padding:"14px 20px",width:"100%",maxWidth:420}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:20}}>{s.icon}</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:14,color:s.color}}>{s.title}</div>
              <div style={{fontSize:12,color:s.color+"99",marginTop:3}}>{s.sub}</div>
              {s.eye&&<div style={{fontSize:11,color:"#A78BFA",marginTop:4}}>👁 {s.eye}</div>}
              {s.note&&<div style={{fontSize:11,color:G.gold,marginTop:3,fontStyle:"italic"}}>⚙ {s.note}</div>}
              {s.auto&&<Badge color="#60A5FA" bg="rgba(96,165,250,0.15)">自动</Badge>}
            </div>
          </div>
        </div>
        {i<steps.length-1&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"2px 0"}}>
          <div style={{width:2,height:16,background:G.border2}}/>
          <div style={{fontSize:10,color:G.text3}}>{i===0?"提交":i===1?"数据就绪":"通过"}</div>
          <div style={{width:2,height:8,background:G.border2}}/>
        </div>}
      </div>)}
    </div>
    <Card style={{marginTop:12}}>
      <div style={{fontSize:13,fontWeight:700,color:G.goldL,marginBottom:8}}>📌 制度说明</div>
      <div style={{fontSize:12,color:G.text2,lineHeight:1.8}}>
        <b style={{color:G.goldL}}>1. 全程可见：</b>申请提交后，{allViewers}均可实时查看进度和内容，任何层级无法私自拦截。<br/>
        <b style={{color:G.goldL}}>2. 驳回与重新审批：</b>一线驳回时系统自动通知上级，看板标记红色预警。上级如认为驳回不合理，可发起重新审批。<br/>
        <b style={{color:G.goldL}}>3. 超时提醒：</b>任一节点超过48小时未审批，自动向该审批人及其上级发送催办通知。<br/>
        <b style={{color:G.goldL}}>4. 一线审批弹性：</b>视区域和销售成熟度而定，上级可配置部分区域跳过一线审批环节。<br/>
        <b style={{color:G.goldL}}>5. 自动通知商务：</b>终审通过后，系统自动通知商务部制作并发放正式授权文件给经销商。<br/>
        <b style={{color:G.goldL}}>6. 区域差异：</b>西南区/华南区为6级审批（含区域经理、大区经理、高级大区经理），东区/北一区/北二区为3级审批（一线经理直接对接全国经理）。
      </div>
    </Card>
  </div>;
}

function HomePage({onNav}){
  const[region,setRegion]=useState(0);
  const curR=REGIONS[region];
  const filtered=curR==="全国"?allDealers:allDealers.filter(d=>d.r===curR);
  const tierCounts=tierDefs.map(t=>({...t,count:filtered.filter(d=>getTier(d.rev).name===t.name).length}));
  const typeCounts=typeDefs.map(t=>({name:t,count:filtered.filter(d=>d.type===t).length}));
  const yearCounts=yearDefs.map(y=>({...y,count:filtered.filter(d=>y.check(d.y)).length}));
  return <div>
    <TabBar items={REGIONS} active={region} onSelect={setRegion}/>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
      {typeCounts.map((t,i)=><Metric key={i} label={t.name} value={t.count}/>)}
    </div>
    <Card>
      <div style={{fontSize:12,color:G.text2,fontWeight:600,marginBottom:10}}>{curR==="全国"?"全国":curR}经销商分级（按年度订货额）</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6}}>
        {tierCounts.map((t,i)=><div key={i} style={{background:t.color+"11",border:"1px solid "+t.color+"33",borderRadius:8,padding:"10px 8px",textAlign:"center"}}>
          <div style={{fontSize:22,fontWeight:700,color:t.color}}>{t.count}</div>
          <div style={{fontSize:11,color:t.color,marginTop:2,fontWeight:600}}>{t.name}</div>
          <div style={{fontSize:10,color:G.text3,marginTop:2}}>{t.rule}</div>
        </div>)}
      </div>
    </Card>
    <Card>
      <div style={{fontSize:12,color:G.text2,fontWeight:600,marginBottom:10}}>合作年限分布</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
        {yearCounts.map((y,i)=><div key={i} style={{background:G.goldBg,border:"1px solid "+G.border,borderRadius:8,padding:"10px 8px",textAlign:"center"}}>
          <div style={{fontSize:22,fontWeight:700,color:G.goldL}}>{y.count}</div>
          <div style={{fontSize:11,color:G.text2,marginTop:2}}>{y.label}</div>
        </div>)}
      </div>
    </Card>
    <div style={{border:"1px solid "+G.border,borderRadius:10,overflow:"hidden"}}>
      <div style={{display:"grid",gridTemplateColumns:"2.5fr 0.8fr 0.8fr 0.8fr 0.8fr 0.7fr",padding:"8px 10px",fontSize:11,fontWeight:600,color:G.text3,background:G.bg3}}>
        <span>经销商</span><span>大区</span><span>级别</span><span>合作</span><span>年订货额</span><span>医院</span>
      </div>
      {filtered.map((d,i)=><div key={i} onClick={()=>onNav(2)} style={{display:"grid",gridTemplateColumns:"2.5fr 0.8fr 0.8fr 0.8fr 0.8fr 0.7fr",padding:"10px 10px",fontSize:13,borderTop:"1px solid "+G.border,cursor:"pointer",alignItems:"center"}}>
        <div><div style={{fontWeight:600,color:G.text,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",cursor:"pointer"}} title={d.n} onClick={e=>{e.stopPropagation();const el=e.target;if(el.style.whiteSpace==="nowrap"){el.style.whiteSpace="normal";el.style.overflow="visible"}else{el.style.whiteSpace="nowrap";el.style.overflow="hidden"}}}>{d.n}</div><div style={{fontSize:11,color:G.text3}}>{d.c}</div></div>
        <span><RegionBadge region={d.r}/></span>
        <span><TierBadge rev={d.rev}/></span>
        <span style={{color:G.text2}}>{d.y}年</span>
        <span style={{color:G.goldL,fontWeight:600}}>{d.rev}万</span>
        <span style={{color:G.text2}}>{d.h}家</span>
      </div>)}
    </div>
  </div>;
}

function SubmitPage(){
  const init=[
    {n:"Fitaya滤器(III代)",cap:"",a:"",b:"",target:""},
    {n:"Aelix三环抓捕器",cap:"",a:"",b:"",target:""},
    {n:"Yuranos二代腹主",cap:"",a:"",b:"",target:""},
    {n:"Ankura II胸主",cap:"",a:"",b:"",target:""},
    {n:"FiQure滤器回收套件",cap:"",a:"",b:"",target:""},
    {n:"Fustar可调弯鞘",cap:"",a:"",b:"",target:""},
  ];
  const[products,setProducts]=useState(init);
  const[hospIdx,setHospIdx]=useState(0);
  const hosps=["达州市中心医院","遂宁市中心医院","资阳市中心医院"];
  const upd=useCallback((i,f,v)=>{setProducts(p=>{const n=[...p];n[i]={...n[i],[f]:v};return n;});},[]);

  const calc=useMemo(()=>products.map(p=>{
    const a=parseFloat(p.a)||0,b=parseFloat(p.b)||0,t=parseFloat(p.target)||0,cap=parseFloat(p.cap)||0;
    return{growth:a>0?(b-a)/a*100:null,tGrowth:b>0?(t-b)/b*100:null,share:cap>0&&t>0?t/cap*100:null};
  }),[products]);

  const totals=useMemo(()=>{
    const a=products.reduce((s,p)=>s+(parseFloat(p.a)||0),0);
    const b=products.reduce((s,p)=>s+(parseFloat(p.b)||0),0);
    const t=products.reduce((s,p)=>s+(parseFloat(p.target)||0),0);
    return{a,b,t,growth:a>0?(b-a)/a*100:null,tGrowth:b>0?(t-b)/b*100:null};
  },[products]);

  const fg=v=>v===null?"—":(v>=0?"+":"")+v.toFixed(1)+"%";
  const gc=v=>v===null?G.text3:v>=0?G.green:G.red;
  const iS=accent=>({width:48,height:28,fontSize:12,padding:"0 6px",borderRadius:6,border:"1px solid "+(accent?G.border2:G.border),background:G.bg3,color:accent?G.gold:G.text,textAlign:"center",fontWeight:accent?600:400});

  return <Card>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8,marginBottom:10}}>
      <div>
        <div style={{fontWeight:700,fontSize:16,color:G.text}}>授权申请</div>
