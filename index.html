<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>代理商授权审批系统</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0A0A;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;color:#F0EDE4;padding:16px}
.wrap{max-width:900px;margin:0 auto}
.tabs{display:flex;gap:5px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:7px 16px;font-size:13px;border-radius:10px;cursor:pointer;border:1px solid rgba(200,164,78,0.12);background:transparent;color:#6B6560}
.tab.a{background:#C8A44E;color:#0A0A0A;font-weight:700;border-color:#C8A44E}
.card{background:#111;border:1px solid rgba(200,164,78,0.12);border-radius:12px;padding:16px;margin-bottom:10px}
.card.danger{border-color:rgba(232,84,84,0.25)}
.badge{font-size:11px;padding:3px 10px;border-radius:6px;display:inline-block;font-weight:600;white-space:nowrap}
.divider{height:1px;background:rgba(200,164,78,0.12);margin:14px 0}
.metric{background:#1A1A1A;border-radius:8px;padding:10px 12px;border:1px solid rgba(200,164,78,0.12)}
.metric .l{font-size:11px;color:#6B6560}.metric .v{font-size:20px;font-weight:700;margin-top:4px;color:#E8D48B}
.gh{display:grid;padding:8px 10px;font-size:11px;font-weight:600;color:#6B6560;background:#1A1A1A}
.gr{display:grid;padding:9px 10px;font-size:13px;border-top:1px solid rgba(200,164,78,0.12);align-items:center;cursor:pointer}
.gr:hover{background:rgba(200,164,78,0.04)}
.st{padding:6px 14px;font-size:12px;border-radius:8px;cursor:pointer;border:1px solid rgba(200,164,78,0.12);background:transparent;color:#6B6560;display:inline-block}
.st.a{background:rgba(200,164,78,0.15);color:#E8D48B;border-color:rgba(200,164,78,0.25);font-weight:600}
.input-sm{width:48px;height:28px;font-size:12px;padding:0 6px;border-radius:6px;border:1px solid rgba(200,164,78,0.12);background:#1A1A1A;color:#F0EDE4;text-align:center}
.input-sm.gold{color:#C8A44E;font-weight:600;border-color:rgba(200,164,78,0.25)}
.note{background:rgba(200,164,78,0.08);border:1px solid rgba(200,164,78,0.12);border-radius:8px;padding:8px 12px;font-size:12px;color:#C8A44E;margin:8px 0;line-height:1.6}
.vis{background:rgba(200,164,78,0.08);border:1px solid rgba(200,164,78,0.12);border-radius:10px;padding:12px 16px;margin-bottom:14px;font-size:12px;color:#C8A44E;line-height:1.7}
.tl{position:relative;padding-left:24px;margin:10px 0}
.tl::before{content:'';position:absolute;left:8px;top:6px;bottom:6px;width:2px;background:rgba(200,164,78,0.12)}
.ti{position:relative;margin-bottom:16px}.ti::before{content:'';position:absolute;left:-20px;top:4px;width:12px;height:12px;border-radius:50%;border:2px solid}
.ti.done::before{background:rgba(74,222,128,0.12);border-color:#4ADE80}
.ti.cur::before{background:rgba(200,164,78,0.08);border-color:#C8A44E}
.ti.fut::before{background:#1A1A1A;border-color:#6B6560}
.step-box{border-radius:12px;padding:14px 20px;width:100%;max-width:420px}
.dropdown{position:absolute;top:100%;left:0;right:0;z-index:10;background:#111;border:1px solid rgba(200,164,78,0.25);border-radius:8px;max-height:200px;overflow-y:auto;margin-top:4px}
.dropdown div{padding:8px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid rgba(200,164,78,0.08);color:#A8A293}
.dropdown div:hover{background:rgba(200,164,78,0.08)}
.dropdown div.sel{color:#E8D48B;background:rgba(200,164,78,0.08)}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.btn{padding:6px 16px;border-radius:8px;cursor:pointer;border:none;font-size:12px;font-weight:600}
.btn-gold{background:#C8A44E;color:#0A0A0A;padding:8px 22px;font-size:13px;font-weight:700}
.btn-green{background:rgba(74,222,128,0.12);color:#4ADE80}
.btn-red{background:rgba(232,84,84,0.12);color:#E85454}
.nt{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;font-weight:600;color:#F0EDE4}
textarea{font-family:inherit}
</style>
</head>

var DL=[{n:"成都诚佳欣浩",c:"吴超",r:"西南区",y:5,v:2200,t:"一级代理商",h:8},{n:"重庆康瑞达",c:"刘洋",r:"西南区",y:3,v:800,t:"一级代理商",h:5},{n:"昆明德润",c:"陈飞",r:"西南区",y:1,v:350,t:"二级代理商",h:3},{n:"贵阳恒信",c:"周勇",r:"西南区",y:8,v:1600,t:"一级代理商",h:7},{n:"上海吴铠科贸",c:"吴铠",r:"东区",y:6,v:3200,t:"一级代理商",h:12},{n:"南京博远",c:"张磊",r:"东区",y:2,v:1100,t:"二级代理商",h:6},{n:"杭州鑫诺",c:"周华",r:"东区",y:12,v:4500,t:"一级代理商",h:18},{n:"北京中盛",c:"王刚",r:"北一区",y:7,v:2800,t:"一级代理商",h:15},{n:"天津仁合",c:"李强",r:"北一区",y:11,v:3500,t:"一级代理商",h:14},{n:"石家庄百瑞",c:"孙明",r:"北二区",y:4,v:1500,t:"二级代理商",h:7},{n:"沈阳恒达",c:"马超",r:"北二区",y:8,v:2100,t:"一级代理商",h:10},{n:"广州信达",c:"林峰",r:"华南区",y:4,v:1800,t:"一级代理商",h:9},{n:"深圳瑞康",c:"黄涛",r:"华南区",y:2,v:600,t:"配送端口",h:4},{n:"武汉合众",c:"赵明",r:"华南区",y:1,v:250,t:"配送端口",h:2}];

function sw(i){V=i;render();}function sr(r){R=r;render();}function th(i){var x=SH.indexOf(i);if(x>=0)SH.splice(x,1);else SH.push(i);render();}

function render(){
var t='';for(var i=0;i<TABS.length;i++)t+='<div class="tab'+(V===i?' a':'')+'" onclick="sw('+i+')">'+TABS[i]+'</div>';
document.getElementById('mt').innerHTML=t;
var c=document.getElementById('ct');
if(V===0)c.innerHTML=pFlow();else if(V===1)c.innerHTML=pHome();else if(V===2)c.innerHTML=pSubmit();else if(V===3)c.innerHTML=pBoard();else if(V===4)c.innerHTML=pDetail();else c.innerHTML=pView();
}

function pFlow(){
var rg=RGS.slice(1),cr=rg[RG]||"西南区",ch=CH[cr]||CH["西南区"],isL=ch.type==="long";
var tabs='';for(var i=0;i<rg.length;i++)tabs+='<div class="st'+(RG===i?' a':'')+'" onclick="RG='+i+';render()">'+rg[i]+'</div>';
var sm=isL?'🏢 <b style="color:#E8D48B">'+cr+'</b>：一线 → '+(ch.area?ch.area.split("（")[0]+' → ':'')+ch.regional.split("（")[0]+' → '+ch.senior.split("（")[0]+' → 周小杰 → 吴璟谊（共'+(ch.area?6:5)+'级）':'🏢 <b style="color:#E8D48B">'+cr+'</b>：一线经理 → 周小杰 → 吴璟谊（共3级）';
var ss=[{t:"授权申请发起",s:"代理商申请 / 一线销售提出 / 主管复核发起",c:"#C8A44E",bg:"rgba(200,164,78,0.15)",bc:"rgba(200,164,78,0.25)",i:"📋"},{t:"销售运营核验",s:"系统自动匹配历史植入数据",c:"#60A5FA",bg:"rgba(96,165,250,0.12)",bc:"rgba(96,165,250,0.25)",i:"🔍",au:1},{t:ch.sales,s:"确认经销商情况，填写意见",c:"#FB923C",bg:"rgba(251,146,60,0.1)",bc:"rgba(251,146,60,0.25)",i:"👤",eye:isL?"大区经理及以上可见":"全国经理及总监可见",note:"视区域和销售成熟度可跳过"}];

ss.push({t:ch.national,s:isL?"全国层面把关":"审核数据合理性",c:"#4ADE80",bg:"rgba(74,222,128,0.1)",bc:"rgba(74,222,128,0.25)",i:"🌐",eye:"销售总监可见"});
ss.push({t:ch.director,s:"最终审批确认",c:"#FFD700",bg:"rgba(255,215,0,0.08)",bc:"rgba(255,215,0,0.2)",i:"👑"});
ss.push({t:"授权生效 → 通知商务部",s:"自动生成授权书，通知商务部发放",c:"#4ADE80",bg:"rgba(74,222,128,0.12)",bc:"rgba(74,222,128,0.25)",i:"✅",au:1});
var h='';for(var j=0;j<ss.length;j++){var s=ss[j];h+='<div style="display:flex;flex-direction:column;align-items:center;width:100%"><div class="step-box" style="background:'+s.bg+';border:1px solid '+s.bc+'"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:20px">'+s.i+'</span><div style="flex:1"><div style="font-weight:700;font-size:14px;color:'+s.c+'">'+s.t+'</div><div style="font-size:12px;color:'+s.c+'99;margin-top:3px">'+s.s+'</div>'+(s.eye?'<div style="font-size:11px;color:#A78BFA;margin-top:4px">👁 '+s.eye+'</div>':'')+(s.note?'<div style="font-size:11px;color:#C8A44E;margin-top:3px;font-style:italic">⚙ '+s.note+'</div>':'')+(s.au?'<span class="badge" style="background:rgba(96,165,250,0.15);color:#60A5FA;margin-top:4px">自动</span>':'')+'</div></div></div>';if(j<ss.length-1)h+='<div style="display:flex;flex-direction:column;align-items:center"><div style="width:2px;height:14px;background:rgba(200,164,78,0.25)"></div><div style="font-size:10px;color:#6B6560">'+(j===0?"提交":j===1?"就绪":"通过")+'</div><div style="width:2px;height:8px;background:rgba(200,164,78,0.25)"></div></div>';h+='</div>';}
return '<div class="vis"><div style="font-weight:700;color:#E8D48B;margin-bottom:4px">核心规则：全链路透明 + 分产品授权</div>• 首次系统化管理，未来按产品线管理，故<b>逐医院、逐产品</b>独立审批<br>• 申请一旦发起，所有上级实时可见<br>• 各区域组织架构不同，审批层级因区域而异<br>• 一线驳回时自动通知上级，上级可发起重新审批</div><div style="font-size:12px;color:#6B6560;margin-bottom:8px">选择大区查看审批链：</div><div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px">'+tabs+'</div><div style="background:#1A1A1A;border:1px solid rgba(200,164,78,0.12);border-radius:8px;padding:8px 14px;font-size:12px;color:#A8A293;margin-bottom:12px">'+sm+'</div><div style="display:flex;flex-direction:column;align-items:center;padding:10px 0">'+h+'</div><div class="card" style="margin-top:12px"><div style="font-weight:700;color:#E8D48B;margin-bottom:8px">📌 制度说明</div><div style="font-size:12px;color:#A8A293;line-height:1.8"><b style="color:#E8D48B">1. 全程可见</b> 所有上级实时查看<br><b style="color:#E8D48B">2. 驳回预警</b> 一线驳回自动通知上级<br><b style="color:#E8D48B">3. 超时提醒</b> 48小时未审批自动催办<br><b style="color:#E8D48B">4. 弹性审批</b> 上级可配置跳过一线<br><b style="color:#E8D48B">5. 通知商务</b> 终审通过自动通知商务部<br><b style="color:#E8D48B">6. 区域差异</b> 西南5级/华南6级/东区北区3级</div></div>';}
